name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:   # also lets you trigger a build manually from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Get the code ───────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Runtime setup ─────────────────────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ── 3. Install Capacitor CLI + deps ──────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 4. Prepare web assets in www/ ────────────────────────────
      - name: Prepare web assets
        run: |
          mkdir -p www
          cp index.html www/
          cp manifest.json www/  2>/dev/null || true
          cp sw.js        www/  2>/dev/null || true
          cp *.png        www/  2>/dev/null || true

      # ── 5. Generate Android project ──────────────────────────────
      - name: Add Android platform
        run: npx cap add android

      - name: Sync web assets into Android project
        run: npx cap sync android

      # ── 6. Build the APK ─────────────────────────────────────────
      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      # ── 7. Upload artifact (downloadable for 90 days) ────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: FamilyTracker-v${{ github.run_number }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 90
